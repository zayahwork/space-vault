<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Room — Space</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>

<header class="rail">
  <div class="rail-left">
    <span class="mark">ROOM</span>
    <span class="sep">/</span>
    <span class="vault">SPACE</span>
  </div>
  <div class="rail-mid">
    <span class="lamp" id="lamp" data-state="idle"></span>
    <span class="state" id="state">connecting</span>
  </div>
  <div class="rail-right">
    <span class="brain" id="brain">—</span>
    <span class="sep">/</span>
    <span class="clock" id="clock">--:--:--</span>
    <span class="utc">UTC</span>
  </div>
</header>

<main>
  <section class="stage" aria-label="The meeting room">
    <svg id="room" viewBox="0 28 900 508" role="img" aria-labelledby="room-title">
      <title id="room-title">Six teammates at a table, with a screen at the far end</title>

      <!-- the screen at the head of the table -->
      <g id="tv">
        <rect id="tv-frame" x="292" y="48" width="316" height="176" rx="3"></rect>
        <rect id="tv-glass" x="296" y="52" width="308" height="168" rx="2"></rect>
        <text id="tv-eyebrow" x="316" y="78">ON THE BOARD</text>
        <g id="tv-body"></g>
      </g>
      <line id="tv-stand" x1="450" y1="224" x2="450" y2="238"></line>

      <!-- the table, seen from your chair -->
      <path id="table" d="M330,302 L570,302 L752,508 L148,508 Z"></path>
      <path id="table-edge" d="M148,508 L752,508"></path>

      <g id="chairs"></g>
      <g id="people"></g>
      <g id="plates"></g>
    </svg>
    <p class="partial" id="partial"></p>
  </section>

  <section class="log" aria-label="What was said">
    <div class="log-head">
      <span>TRANSCRIPT</span>
      <span id="count">0 lines</span>
    </div>
    <div class="log-body" id="log">
      <p class="empty">Nothing said yet. Talk, or type below.</p>
    </div>
  </section>
</main>

<footer class="deck">
  <form id="composer" autocomplete="off">
    <input id="input" type="text" placeholder="Type instead of talking" aria-label="Say something to the room">
    <button type="submit">Send</button>
  </form>
  <button id="end" type="button" class="end">End call</button>
  <p class="note">Talk any time — they stop mid-word. Nothing on screen moves without real audio.</p>
</footer>

<script src="/app.js"></script>
</body>
</html>
